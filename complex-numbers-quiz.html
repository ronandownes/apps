<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complex Numbers Quiz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px 15px;
        }

        .container { max-width: 600px; margin: 0 auto; }

        h1 {
            color: #2d2d2d;
            text-align: center;
            margin-bottom: 4px;
            font-weight: 400;
            font-size: 1.6rem;
        }

        .level-title {
            color: #009B77;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .level-nav {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .level-btn {
            background: white;
            border: 2px solid #ddd;
            color: #666;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .level-btn:hover { border-color: #009B77; color: #009B77; }
        .level-btn.active { background: #009B77; border-color: #009B77; color: white; }

        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 6px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-fill {
            background: #009B77;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-card {
            background: white;
            border-radius: 12px;
            padding: 25px 30px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            min-height: 340px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        .question-num { color: #888; }
        .score-badge { color: #009B77; font-weight: 600; }

        .equation {
            font-size: 1.4rem;
            text-align: center;
            margin: 20px 0 25px;
            color: #333;
        }

        .choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .choice-btn {
            background: #fafafa;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            padding: 12px 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #333;
        }

        .choice-btn:hover:not(:disabled) {
            border-color: #009B77;
            background: #f0faf8;
        }

        .choice-btn.correct {
            background: #e8f5e9;
            border-color: #4caf50;
            color: #2e7d32;
        }

        .choice-btn.incorrect {
            background: #ffebee;
            border-color: #ef5350;
            color: #c62828;
        }

        .choice-btn:disabled { cursor: default; }

        .feedback {
            margin-top: 15px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .feedback-correct { color: #2e7d32; text-align: center; font-weight: 500; }

        .feedback-incorrect {
            color: #333;
            background: #fff8e1;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #ffc107;
        }

        .solution {
            margin-top: 12px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #555;
        }

        .solution-title {
            font-weight: 600;
            color: #009B77;
            margin-bottom: 8px;
        }

        .next-btn {
            display: block;
            margin: 15px auto 0;
            background: #009B77;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .next-btn:hover { background: #00876a; }

        .halfway, .results {
            text-align: center;
            padding: 20px 10px;
        }

        .halfway h2 { font-size: 1.4rem; color: #333; margin-bottom: 10px; font-weight: 500; }
        .halfway p { color: #666; margin-bottom: 15px; }
        .halfway .score-display { font-size: 1.5rem; color: #009B77; font-weight: 600; margin: 10px 0; }

        .results h2 { font-size: 1.6rem; color: #333; margin-bottom: 10px; }
        .results .final-score { font-size: 3rem; color: #009B77; font-weight: 700; margin: 15px 0; }
        .results .message { color: #666; margin-bottom: 20px; }

        .certificate {
            background: linear-gradient(135deg, #fffef5 0%, #fff8dc 100%);
            border: 4px double #c9a227;
            border-radius: 8px;
            padding: 20px;
            margin: 15px 0;
            position: relative;
        }

        .certificate h3 { font-size: 0.9rem; color: #888; font-weight: 400; }
        .certificate .cert-title { font-size: 1.2rem; color: #333; font-weight: 600; margin: 8px 0; }
        .certificate .student-name { font-size: 1.5rem; color: #c9a227; font-family: Georgia, serif; font-style: italic; margin: 10px 0; }
        .certificate .stars { font-size: 1.5rem; margin: 10px 0; }

        .name-input {
            padding: 8px 15px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 20px;
            width: 150px;
            text-align: center;
            margin-right: 8px;
        }

        .name-input:focus { outline: none; border-color: #009B77; }

        .claim-btn {
            background: #c9a227;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .restart-btn {
            background: white;
            color: #009B77;
            border: 2px solid #009B77;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            margin: 5px;
            transition: all 0.2s;
        }

        .restart-btn:hover { background: #009B77; color: white; }

        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1000;
        }

        .confetti {
            position: absolute;
            top: -20px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(105vh) rotate(720deg); }
        }

        .ticker {
            width: 8px;
            height: 20px;
            border-radius: 2px;
        }

        .hidden { display: none !important; }

        .countdown { color: #999; font-size: 0.8rem; margin-top: 10px; }

        /* Halfway sparkles */
        .sparkle-container {
            position: relative;
            display: inline-block;
        }

        .sparkle {
            position: absolute;
            font-size: 1.2rem;
            animation: sparkle 1s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .trophy-bounce {
            display: inline-block;
            animation: trophyBounce 0.5s ease infinite alternate;
        }

        @keyframes trophyBounce {
            from { transform: translateY(0) rotate(-5deg); }
            to { transform: translateY(-8px) rotate(5deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Complex Numbers</h1>
        <div class="level-title" id="level-title">Level 1: Conjugate</div>
        
        <div class="level-nav" id="level-nav"></div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div class="quiz-card" id="quiz-card"></div>
    </div>

    <div class="confetti-container" id="confetti-container"></div>

    <script>
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playNote(freq, duration, delay = 0, type = 'triangle', vol = 0.2) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime + delay);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delay + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + delay);
            osc.stop(audioCtx.currentTime + delay + duration);
        }

        function playCorrect() {
            initAudio();
            playNote(523, 0.1, 0);
            playNote(659, 0.15, 0.08);
        }

        function playIncorrect() {
            initAudio();
            playNote(200, 0.2, 0, 'sawtooth', 0.15);
        }

        function playMildChime() {
            initAudio();
            playNote(523, 0.2, 0, 'sine', 0.15);
            playNote(659, 0.2, 0.15, 'sine', 0.15);
            playNote(784, 0.3, 0.3, 'sine', 0.15);
        }

        function playApplause() {
            initAudio();
            // Simulate applause with noise bursts
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const freq = 100 + Math.random() * 300;
                    playNote(freq, 0.05, 0, 'sawtooth', 0.03);
                }, i * 50 + Math.random() * 30);
            }
        }

        function playFanfare() {
            initAudio();
            const notes = [
                [392, 0.15], [392, 0.15], [392, 0.15], [523, 0.4],
                [466, 0.15], [523, 0.15], [587, 0.15], [659, 0.5],
                [784, 0.2], [784, 0.2], [784, 0.6]
            ];
            let time = 0;
            notes.forEach(([freq, dur]) => {
                playNote(freq, dur, time, 'triangle', 0.25);
                playNote(freq * 0.5, dur, time, 'triangle', 0.1);
                time += dur + 0.03;
            });
        }

        function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function randNonZero(min, max) { let n; do { n = randInt(min, max); } while (n === 0); return n; }
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function fmtComplex(a, b, useI = 'i') {
            if (b === 0) return `${a}`;
            if (a === 0) return b === 1 ? useI : b === -1 ? `-${useI}` : `${b}${useI}`;
            const sign = b > 0 ? '+' : '-';
            const bAbs = Math.abs(b);
            const bStr = bAbs === 1 ? useI : `${bAbs}${useI}`;
            return `${a} ${sign} ${bStr}`;
        }

        function fmtComplexLatex(a, b) {
            if (b === 0) return `${a}`;
            if (a === 0) return b === 1 ? 'i' : b === -1 ? '-i' : `${b}i`;
            const sign = b > 0 ? '+' : '-';
            const bAbs = Math.abs(b);
            const bStr = bAbs === 1 ? 'i' : `${bAbs}i`;
            return `${a} ${sign} ${bStr}`;
        }

        const encouragements = [
            "Nice work! Keep going!",
            "You're doing well!",
            "Great progress so far!",
            "Solid effort! Almost there!",
            "Good job! Stay focused!",
            "Well done! Keep it up!"
        ];

        // Level definitions
        const levels = [
            {
                id: 1, title: "Level 1: Conjugate",
                generate: () => {
                    const a = randInt(-8, 8);
                    const b = randNonZero(-8, 8);
                    const ans = fmtComplexLatex(a, -b);
                    return {
                        eq: `z = ${fmtComplexLatex(a, b)}`,
                        question: "\\bar{z} = ?",
                        ans: ans,
                        solution: `To find the conjugate, change the sign of the imaginary part.\n\\bar{z} = ${a} ${-b >= 0 ? '+' : '-'} ${Math.abs(b)}i \\cdot (-1) = ${ans}`,
                        choices: [
                            { val: ans, correct: true },
                            { val: fmtComplexLatex(-a, b), error: "You changed the sign of the real part. Only change the imaginary part's sign." },
                            { val: fmtComplexLatex(-a, -b), error: "You changed both signs. The conjugate only changes the imaginary part." },
                            { val: fmtComplexLatex(a, b), error: "That's the original number. The conjugate has the opposite sign on the imaginary part." }
                        ]
                    };
                }
            },
            {
                id: 2, title: "Level 2: |z|²",
                generate: () => {
                    const a = randInt(-6, 6);
                    const b = randNonZero(-6, 6);
                    const ans = a*a + b*b;
                    return {
                        eq: `z = ${fmtComplexLatex(a, b)}`,
                        question: "|z|^2 = ?",
                        ans: ans,
                        solution: `|z|² = a² + b² where z = a + bi\n|z|² = (${a})² + (${b})² = ${a*a} + ${b*b} = ${ans}`,
                        choices: [
                            { val: ans, correct: true },
                            { val: a*a - b*b, error: `You subtracted b². Remember: |z|² = a² + b² (always add).` },
                            { val: Math.abs(a) + Math.abs(b), error: "You added |a| + |b|. For modulus squared, use a² + b²." },
                            { val: (a + b) * (a + b), error: "You calculated (a + b)². The formula is a² + b², not (a + b)²." }
                        ]
                    };
                }
            },
            {
                id: 3, title: "Level 3: |z|",
                generate: () => {
                    // Use Pythagorean triples for nice answers
                    const triples = [[3,4,5],[5,12,13],[6,8,10],[8,15,17],[9,12,15]];
                    const [a, b, c] = triples[randInt(0, triples.length - 1)];
                    const signA = Math.random() > 0.5 ? 1 : -1;
                    const signB = Math.random() > 0.5 ? 1 : -1;
                    const realA = a * signA, imagB = b * signB;
                    return {
                        eq: `z = ${fmtComplexLatex(realA, imagB)}`,
                        question: "|z| = ?",
                        ans: c,
                        solution: `|z| = √(a² + b²)\n|z| = √((${realA})² + (${imagB})²) = √(${a*a} + ${b*b}) = √${c*c} = ${c}`,
                        choices: [
                            { val: c, correct: true },
                            { val: c*c, error: "That's |z|², not |z|. Take the square root." },
                            { val: Math.abs(realA) + Math.abs(imagB), error: "You added |a| + |b|. The modulus is √(a² + b²)." },
                            { val: Math.abs(realA - imagB), error: "The modulus uses squares and addition: √(a² + b²)." }
                        ]
                    };
                }
            },
            {
                id: 4, title: "Level 4: Products",
                generate: () => {
                    const type = randInt(0, 2);
                    let a1, b1, a2, b2, eq, rA, rB;
                    
                    if (type === 0) {
                        // Pure imaginary × complex
                        const k = randNonZero(-5, 5);
                        a2 = randInt(-5, 5);
                        b2 = randNonZero(-5, 5);
                        rA = -k * b2;
                        rB = k * a2;
                        eq = `(${k === 1 ? '' : k === -1 ? '-' : k}i)(${fmtComplexLatex(a2, b2)})`;
                    } else {
                        a1 = randInt(-4, 4);
                        b1 = randNonZero(-4, 4);
                        a2 = randInt(-4, 4);
                        b2 = randNonZero(-4, 4);
                        rA = a1*a2 - b1*b2;
                        rB = a1*b2 + a2*b1;
                        eq = `(${fmtComplexLatex(a1, b1)})(${fmtComplexLatex(a2, b2)})`;
                    }
                    const ans = fmtComplexLatex(rA, rB);
                    
                    return {
                        eq: eq,
                        question: "= ?",
                        ans: ans,
                        solution: `Use FOIL and remember i² = -1.\nReal part: (${type === 0 ? '0' : a1})(${a2}) - (${type === 0 ? (eq.match(/-?\d*/)[0] || 1) : b1})(${b2}) = ${rA}\nImaginary part: (${type === 0 ? '0' : a1})(${b2}) + (${a2})(${type === 0 ? (eq.match(/-?\d*/)[0] || 1) : b1}) = ${rB}\nAnswer: ${ans}`,
                        choices: [
                            { val: ans, correct: true },
                            { val: fmtComplexLatex(rA, -rB), error: "Check your signs on the imaginary part." },
                            { val: fmtComplexLatex(-rA, rB), error: "Remember: i² = -1, so the i·i term becomes negative real." },
                            { val: fmtComplexLatex(rA + rB, rA - rB), error: "Apply FOIL carefully: (a+bi)(c+di) = ac - bd + (ad+bc)i" }
                        ]
                    };
                }
            },
            {
                id: 5, title: "Level 5: Division",
                generate: () => {
                    const a1 = randInt(-6, 6);
                    const b1 = randNonZero(-6, 6);
                    const a2 = randNonZero(-4, 4);
                    const b2 = randNonZero(-4, 4);
                    const denom = a2*a2 + b2*b2;
                    const numR = a1*a2 + b1*b2;
                    const numI = b1*a2 - a1*b2;
                    
                    // Simplify if possible
                    const gcd = (x, y) => y === 0 ? Math.abs(x) : gcd(y, x % y);
                    const g = gcd(gcd(numR, numI), denom);
                    const rNum = numR / g, iNum = numI / g, d = denom / g;
                    
                    let ans;
                    if (d === 1) {
                        ans = fmtComplexLatex(rNum, iNum);
                    } else {
                        const rStr = `\\frac{${rNum}}{${d}}`;
                        const iStr = iNum >= 0 ? `+ \\frac{${iNum}}{${d}}i` : `- \\frac{${-iNum}}{${d}}i`;
                        ans = `${rStr} ${iStr}`;
                    }
                    
                    return {
                        eq: `\\frac{${fmtComplexLatex(a1, b1)}}{${fmtComplexLatex(a2, b2)}}`,
                        question: "= ?",
                        ans: ans,
                        solution: `Multiply top and bottom by the conjugate of the denominator:\n= \\frac{(${fmtComplexLatex(a1, b1)})(${fmtComplexLatex(a2, -b2)})}{(${fmtComplexLatex(a2, b2)})(${fmtComplexLatex(a2, -b2)})}\n= \\frac{${numR} + ${numI}i}{${denom}} = ${ans}`,
                        choices: shuffle([
                            { val: ans, correct: true },
                            { val: d === 1 ? fmtComplexLatex(rNum, -iNum) : `\\frac{${rNum}}{${d}} ${-iNum >= 0 ? '+' : '-'} \\frac{${Math.abs(iNum)}}{${d}}i`, error: "Check your sign on the imaginary part when multiplying by the conjugate." },
                            { val: fmtComplexLatex(a1*a2, b1*b2), error: "You can't divide complex numbers term by term. Multiply by the conjugate." },
                            { val: d === 1 ? fmtComplexLatex(-rNum, iNum) : `\\frac{${-rNum}}{${d}} + \\frac{${iNum}}{${d}}i`, error: "Check your calculation of the real part." }
                        ])
                    };
                }
            },
            {
                id: 6, title: "Level 6: Division (z₁/z₂)",
                generate: () => {
                    const vars = [['z_1', 'z_2'], ['z', 'w'], ['w_1', 'w_2']][randInt(0, 2)];
                    const a1 = randInt(-5, 5);
                    const b1 = randNonZero(-5, 5);
                    const a2 = randNonZero(-3, 3);
                    const b2 = randNonZero(-3, 3);
                    const denom = a2*a2 + b2*b2;
                    const numR = a1*a2 + b1*b2;
                    const numI = b1*a2 - a1*b2;
                    
                    const gcd = (x, y) => y === 0 ? Math.abs(x) : gcd(y, x % y);
                    const g = gcd(gcd(numR, numI), denom);
                    const rNum = numR / g, iNum = numI / g, d = denom / g;
                    
                    let ans = d === 1 ? fmtComplexLatex(rNum, iNum) : `\\frac{${rNum}}{${d}} ${iNum >= 0 ? '+' : '-'} \\frac{${Math.abs(iNum)}}{${d}}i`;
                    
                    return {
                        eq: `${vars[0]} = ${fmtComplexLatex(a1, b1)}, \\quad ${vars[1]} = ${fmtComplexLatex(a2, b2)}`,
                        question: `\\frac{${vars[0]}}{${vars[1]}} = ?`,
                        ans: ans,
                        solution: `\\frac{${vars[0]}}{${vars[1]}} = \\frac{${fmtComplexLatex(a1, b1)}}{${fmtComplexLatex(a2, b2)}}\nMultiply by conjugate: \\frac{(${fmtComplexLatex(a1, b1)})(${fmtComplexLatex(a2, -b2)})}{|${vars[1]}|^2}\n= \\frac{${numR} + ${numI}i}{${denom}} = ${ans}`,
                        choices: shuffle([
                            { val: ans, correct: true },
                            { val: d === 1 ? fmtComplexLatex(rNum, -iNum) : `\\frac{${rNum}}{${d}} ${-iNum >= 0 ? '+' : '-'} \\frac{${Math.abs(iNum)}}{${d}}i`, error: "Sign error on imaginary part. Check conjugate multiplication." },
                            { val: fmtComplexLatex(Math.round(a1/a2), Math.round(b1/b2)) || '1', error: "Division isn't term-by-term. Use the conjugate method." },
                            { val: d === 1 ? fmtComplexLatex(iNum, rNum) : `\\frac{${iNum}}{${d}} + \\frac{${rNum}}{${d}}i`, error: "You swapped real and imaginary parts." }
                        ])
                    };
                }
            },
            {
                id: 7, title: "Level 7: Sum",
                generate: () => {
                    const a1 = randInt(-8, 8);
                    const b1 = randNonZero(-8, 8);
                    const a2 = randInt(-8, 8);
                    const b2 = randNonZero(-8, 8);
                    const rA = a1 + a2, rB = b1 + b2;
                    const ans = fmtComplexLatex(rA, rB);
                    
                    return {
                        eq: `(${fmtComplexLatex(a1, b1)}) + (${fmtComplexLatex(a2, b2)})`,
                        question: "= ?",
                        ans: ans,
                        solution: `Add real parts: ${a1} + ${a2} = ${rA}\nAdd imaginary parts: ${b1} + ${b2} = ${rB}\nAnswer: ${ans}`,
                        choices: [
                            { val: ans, correct: true },
                            { val: fmtComplexLatex(a1 * a2, b1 * b2), error: "You multiplied instead of adding. Add real to real, imaginary to imaginary." },
                            { val: fmtComplexLatex(rA, b1 - b2), error: "Add the imaginary parts, don't subtract." },
                            { val: fmtComplexLatex(a1 - a2, rB), error: "Add the real parts, don't subtract." }
                        ]
                    };
                }
            },
            {
                id: 8, title: "Level 8: Verify |z₁z₂| = |z₁||z₂|",
                generate: () => {
                    const triples = [[3,4,5],[5,12,13],[6,8,10]];
                    const [a1, b1, m1] = triples[randInt(0, triples.length - 1)];
                    const [a2, b2, m2] = triples[randInt(0, triples.length - 1)];
                    const s1 = Math.random() > 0.5 ? 1 : -1;
                    const s2 = Math.random() > 0.5 ? 1 : -1;
                    
                    const prodMod = m1 * m2;
                    
                    return {
                        eq: `z_1 = ${fmtComplexLatex(a1 * s1, b1)}, \\quad z_2 = ${fmtComplexLatex(a2, b2 * s2)}`,
                        question: "|z_1||z_2| = ?",
                        ans: prodMod,
                        solution: `|z_1| = √(${a1}² + ${b1}²) = √${a1*a1 + b1*b1} = ${m1}\n|z_2| = √(${a2}² + ${b2}²) = √${a2*a2 + b2*b2} = ${m2}\n|z_1||z_2| = ${m1} × ${m2} = ${prodMod}\nThis equals |z_1z_2|, confirming the identity.`,
                        choices: [
                            { val: prodMod, correct: true },
                            { val: m1 + m2, error: "Multiply the moduli, don't add them." },
                            { val: m1 * m1 * m2 * m2, error: "That's |z_1|²|z_2|². Just multiply |z_1| × |z_2|." },
                            { val: Math.abs(m1 - m2), error: "The identity uses multiplication: |z_1||z_2|." }
                        ]
                    };
                }
            },
            {
                id: 9, title: "Level 9: Verify Conjugate Product",
                generate: () => {
                    const a1 = randInt(-4, 4);
                    const b1 = randNonZero(-4, 4);
                    const a2 = randInt(-4, 4);
                    const b2 = randNonZero(-4, 4);
                    
                    // Product
                    const pR = a1*a2 - b1*b2;
                    const pI = a1*b2 + a2*b1;
                    
                    // Conjugate of product
                    const ans = fmtComplexLatex(pR, -pI);
                    
                    // Product of conjugates
                    const cR = a1*a2 - (-b1)*(-b2);
                    const cI = a1*(-b2) + a2*(-b1);
                    
                    return {
                        eq: `z_1 = ${fmtComplexLatex(a1, b1)}, \\quad z_2 = ${fmtComplexLatex(a2, b2)}`,
                        question: "\\overline{z_1 z_2} = ?",
                        ans: ans,
                        solution: `First find z_1z_2:\n(${fmtComplexLatex(a1, b1)})(${fmtComplexLatex(a2, b2)}) = ${fmtComplexLatex(pR, pI)}\n\nThen conjugate:\n\\overline{z_1z_2} = ${ans}\n\nNote: This equals \\bar{z_1}\\bar{z_2} = (${fmtComplexLatex(a1, -b1)})(${fmtComplexLatex(a2, -b2)}) = ${fmtComplexLatex(cR, cI)}`,
                        choices: [
                            { val: ans, correct: true },
                            { val: fmtComplexLatex(pR, pI), error: "That's z_1z_2. Take its conjugate (change sign of imaginary part)." },
                            { val: fmtComplexLatex(-pR, -pI), error: "Only change the sign of the imaginary part for conjugate." },
                            { val: fmtComplexLatex(-pR, pI), error: "The conjugate changes the imaginary part's sign, not the real part." }
                        ]
                    };
                }
            }
        ];

        let currentLevel = 0, currentQ = 0, score = 0, questions = [], answered = false, countdownInterval = null;

        function buildLevelNav() {
            const nav = document.getElementById('level-nav');
            nav.innerHTML = '';
            levels.forEach((lvl, i) => {
                const btn = document.createElement('button');
                btn.className = 'level-btn' + (i === currentLevel ? ' active' : '');
                btn.textContent = lvl.id;
                btn.onclick = () => setLevel(i);
                nav.appendChild(btn);
            });
        }

        function setLevel(index) {
            currentLevel = index;
            currentQ = 0;
            score = 0;
            questions = [];
            for (let i = 0; i < 6; i++) {
                const q = levels[currentLevel].generate();
                q.choices = shuffle(q.choices);
                questions.push(q);
            }
            document.getElementById('level-title').textContent = levels[currentLevel].title;
            buildLevelNav();
            renderQuestion();
        }

        function updateProgress() {
            document.getElementById('progress-fill').style.width = `${(currentQ / 6) * 100}%`;
        }

        function renderQuestion() {
            answered = false;
            updateProgress();
            const card = document.getElementById('quiz-card');
            const q = questions[currentQ];

            card.innerHTML = `
                <div class="question-header">
                    <span class="question-num">Question ${currentQ + 1} of 6</span>
                    <span class="score-badge">${score}/6</span>
                </div>
                <div class="equation" id="equation"></div>
                <div class="equation" id="question-text" style="font-size: 1.2rem; margin-top: -10px;"></div>
                <div class="choices" id="choices"></div>
                <div class="feedback" id="feedback"></div>
            `;

            katex.render(q.eq, document.getElementById('equation'), { displayMode: true });
            katex.render(q.question, document.getElementById('question-text'), { displayMode: false });

            const choicesDiv = document.getElementById('choices');
            q.choices.forEach((choice) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerHTML = `<span id="choice-${choice.val.replace(/[^a-z0-9]/gi, '')}"></span>`;
                choicesDiv.appendChild(btn);
                katex.render(String(choice.val), btn.querySelector('span'), { displayMode: false });
                btn.onclick = () => checkAnswer(choice, btn, q);
            });
        }

        function checkAnswer(choice, btn, q) {
            if (answered) return;
            answered = true;

            const feedback = document.getElementById('feedback');
            const allBtns = document.querySelectorAll('.choice-btn');

            allBtns.forEach(b => b.disabled = true);

            if (choice.correct) {
                score++;
                playCorrect();
                btn.classList.add('correct');
                feedback.innerHTML = `<div class="feedback-correct">✓ Correct!</div>
                    <div class="solution"><div class="solution-title">Solution</div><div id="sol"></div></div>`;
            } else {
                playIncorrect();
                btn.classList.add('incorrect');
                // Find and mark the correct button
                const correctChoice = q.choices.find(c => c.correct);
                allBtns.forEach(b => {
                    const btnText = b.textContent.trim();
                    if (btnText === String(correctChoice.val).replace(/[\\{}]/g, '').trim()) {
                        b.classList.add('correct');
                    }
                });
                feedback.innerHTML = `<div class="feedback-incorrect">${choice.error}</div>
                    <div class="solution"><div class="solution-title">Solution</div><div id="sol"></div></div>`;
            }
            
            // Render solution with KaTeX
            const solEl = document.getElementById('sol');
            const solLines = q.solution.split('\n');
            solLines.forEach(line => {
                const p = document.createElement('div');
                p.style.marginBottom = '4px';
                if (line.includes('=') || line.includes('√') || line.includes('²')) {
                    try { katex.render(line, p, { displayMode: false }); }
                    catch { p.textContent = line; }
                } else {
                    p.textContent = line;
                }
                solEl.appendChild(p);
            });

            const nextBtn = document.createElement('button');
            nextBtn.className = 'next-btn';
            nextBtn.textContent = currentQ < 5 ? 'Next →' : 'Results →';
            nextBtn.onclick = nextQuestion;
            document.getElementById('quiz-card').appendChild(nextBtn);
        }

        function nextQuestion() {
            currentQ++;
            if (currentQ === 3) showHalfway();
            else if (currentQ >= 6) showResults();
            else renderQuestion();
        }

        function showHalfway() {
            updateProgress();
            playMildChime();
            launchSparkles();
            
            const enc = encouragements[randInt(0, encouragements.length - 1)];
            const card = document.getElementById('quiz-card');
            card.innerHTML = `
                <div class="halfway">
                    <div style="font-size: 2.5rem; margin-bottom: 10px;">✨</div>
                    <h2>Halfway!</h2>
                    <p>${enc}</p>
                    <div class="score-display">${score}/3</div>
                    <button class="next-btn" onclick="renderQuestion()">Continue →</button>
                </div>
            `;
        }

        function showResults() {
            updateProgress();
            playFanfare();
            setTimeout(playApplause, 500);
            launchTickerTape();

            const stars = '⭐'.repeat(Math.max(1, Math.ceil(score / 1.2)));
            let message = score === 6 ? "Perfect! Outstanding!" : score >= 5 ? "Excellent work!" : score >= 4 ? "Great job!" : score >= 3 ? "Good effort!" : "Keep practising!";

            const card = document.getElementById('quiz-card');
            card.innerHTML = `
                <div class="results">
                    <div class="trophy-bounce" style="font-size: 2.5rem;">🏆</div>
                    <h2>Complete!</h2>
                    <div class="final-score">${score}/6</div>
                    <p class="message">${message}</p>
                    
                    <div id="name-section">
                        <input type="text" class="name-input" id="name-input" placeholder="Your name" maxlength="15">
                        <button class="claim-btn" onclick="claimCertificate()">Get Certificate</button>
                        <div class="countdown">Expires in <span id="timer">20</span>s</div>
                    </div>

                    <div id="certificate-area"></div>

                    <div style="margin-top: 15px;">
                        <button class="restart-btn" onclick="setLevel(${currentLevel})">Try Again</button>
                        ${currentLevel < levels.length - 1 ? `<button class="restart-btn" onclick="setLevel(${currentLevel + 1})">Next Level</button>` : ''}
                    </div>
                </div>
            `;

            let timeLeft = 20;
            countdownInterval = setInterval(() => {
                timeLeft--;
                const t = document.getElementById('timer');
                if (t) t.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    const ns = document.getElementById('name-section');
                    if (ns) ns.innerHTML = '<p style="color:#999;font-size:0.85rem;">Expired</p>';
                }
            }, 1000);
        }

        function claimCertificate() {
            clearInterval(countdownInterval);
            const name = document.getElementById('name-input').value.trim() || 'Star';
            const stars = '⭐'.repeat(Math.max(1, Math.ceil(score / 1.2)));
            
            document.getElementById('name-section').classList.add('hidden');
            document.getElementById('certificate-area').innerHTML = `
                <div class="certificate">
                    <h3>Certificate of Achievement</h3>
                    <div class="cert-title">Complex Numbers</div>
                    <div class="student-name">${name}</div>
                    <div style="font-size:0.9rem;color:#666;">${levels[currentLevel].title}</div>
                    <div style="margin:8px 0;"><strong>${score}/6</strong></div>
                    <div class="stars">${stars}</div>
                    <div style="font-size:0.75rem;color:#aaa;">${new Date().toLocaleDateString()}</div>
                </div>
                <p style="color:#888;font-size:0.8rem;">📸 Screenshot now!</p>
            `;
            playMildChime();
            launchTickerTape();
        }

        function launchSparkles() {
            const container = document.getElementById('confetti-container');
            container.innerHTML = '';
            const colors = ['#FFD700', '#FFA500', '#00CED1', '#9370DB', '#3CB371'];
            for (let i = 0; i < 25; i++) {
                const spark = document.createElement('div');
                spark.textContent = '✦';
                spark.className = 'confetti';
                spark.style.left = Math.random() * 100 + '%';
                spark.style.color = colors[Math.floor(Math.random() * colors.length)];
                spark.style.fontSize = (12 + Math.random() * 10) + 'px';
                spark.style.animationDuration = (2 + Math.random() * 2) + 's';
                spark.style.animationDelay = Math.random() * 0.5 + 's';
                container.appendChild(spark);
            }
            setTimeout(() => container.innerHTML = '', 4000);
        }

        function launchTickerTape() {
            const container = document.getElementById('confetti-container');
            container.innerHTML = '';
            const colors = ['#009B77', '#FFD700', '#FF6B6B', '#4ECDC4', '#9B59B6', '#3498DB', '#E74C3C', '#2ECC71', '#F39C12', '#1ABC9C'];
            
            for (let i = 0; i < 80; i++) {
                const ticker = document.createElement('div');
                ticker.className = 'confetti ticker';
                ticker.style.left = Math.random() * 100 + '%';
                ticker.style.background = colors[Math.floor(Math.random() * colors.length)];
                ticker.style.width = (5 + Math.random() * 8) + 'px';
                ticker.style.height = (15 + Math.random() * 15) + 'px';
                ticker.style.animationDuration = (2.5 + Math.random() * 2.5) + 's';
                ticker.style.animationDelay = Math.random() * 1 + 's';
                ticker.style.borderRadius = Math.random() > 0.5 ? '2px' : '0';
                container.appendChild(ticker);
            }
            setTimeout(() => container.innerHTML = '', 6000);
        }

        buildLevelNav();
        setLevel(0);
    </script>
</body>
</html>
