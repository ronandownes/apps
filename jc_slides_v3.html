<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Maths - Mr Downes Maths</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f5f5f5; 
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: #e8e8e8;
            padding: 12px 20px;
            border-bottom: 3px solid transparent;
            border-image: linear-gradient(90deg, #22c55e, #3b82f6, #ef4444, #1a1a1a) 1;
        }
        .topbar-inner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .brand { display: flex; align-items: center; gap: 8px; }
        .brand-text { font-weight: 700; font-size: 1.15em; color: #1a1a1a; }
        .tagline { color: #555; font-size: 0.9em; }
        .mark { display: flex; gap: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.green { background: #22c55e; }
        .dot.blue { background: #3b82f6; }
        .dot.red { background: #ef4444; }
        .dot.black { background: #1a1a1a; }
        .level-badge {
            background: #8b5cf6;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .main {
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }

        .slide {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 30px;
            min-height: 420px;
        }
        .slide-header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }
        .slide-header h2 { font-size: 1.3em; color: #333; }
        .slide-header .subtitle { font-size: 0.9em; color: #666; margin-top: 4px; }
        .slide-header.selected-header { border-bottom-color: #00a6a0; }
        .slide-header.selected-header h2 { color: #00a6a0; }

        .lo-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            margin-bottom: 12px;
            background: #fafafa;
            border-radius: 8px;
            border: 1px solid #eee;
            transition: all 0.3s;
        }
        .lo-item:hover { background: #f0f0f0; }
        .lo-item.ticked { background: #e8f5f5; border-color: #00a6a0; }
        .lo-item input[type="checkbox"] {
            width: 20px; height: 20px; margin-top: 2px;
            accent-color: #00a6a0; cursor: pointer; flex-shrink: 0;
        }
        .lo-item .code {
            background: #e0e0e0; color: #444;
            padding: 3px 10px; border-radius: 10px;
            font-size: 0.8em; font-weight: 600;
            white-space: nowrap; flex-shrink: 0;
        }
        .lo-item.ticked .code { background: #00a6a0; color: white; }
        .lo-item .content { flex: 1; }
        .lo-item .text { font-size: 1.05em; line-height: 1.5; color: #333; }
        .lo-item .hl-tag {
            background: #3b82f6; color: white;
            padding: 2px 6px; border-radius: 4px;
            font-size: 0.7em; font-weight: 600; margin-left: 8px;
        }
        .lo-item .official {
            display: none;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #ddd;
            font-size: 0.85em;
            color: #888;
            font-style: italic;
        }
        body.show-official .lo-item .official { display: block; }

        /* Selected/Presentation mode items */
        .lo-item.presentation {
            padding: 18px 20px;
            margin-bottom: 15px;
            border: 2px solid #eee;
        }
        .lo-item.presentation .text { font-size: 1.15em; }
        .lo-item.presentation .code { font-size: 0.85em; padding: 4px 12px; }
        
        /* Reveal states */
        .lo-item.upcoming {
            color: #bbb;
            border-color: #eee;
            background: #fcfcfc;
        }
        .lo-item.upcoming .code { background: #e8e8e8; color: #aaa; }
        .lo-item.upcoming .text { color: #bbb; }
        
        .lo-item.current {
            background: #e8f5f5;
            border-color: #00a6a0;
            box-shadow: 0 0 0 3px rgba(0,166,160,0.2);
        }
        .lo-item.current .code { background: #00a6a0; color: white; }
        
        .lo-item.revealed {
            background: #fafafa;
            border-color: #ddd;
        }
        .lo-item.revealed .code { background: #666; color: white; }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 15px 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            flex-wrap: wrap;
            gap: 10px;
        }
        .nav-left, .nav-center, .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn {
            background: #00a6a0; color: white; border: none;
            padding: 10px 20px; border-radius: 6px; cursor: pointer;
            font-weight: 600; font-size: 0.95em; transition: all 0.2s;
        }
        .btn:hover { background: #00b8b0; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn.secondary { background: #e0e0e0; color: #444; }
        .btn.secondary:hover { background: #d0d0d0; }
        .btn.active { background: #007a75; }
        .page-info { font-size: 1em; color: #666; font-weight: 600; min-width: 80px; text-align: center; }
        
        .toggle-label {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.85em; color: #666; cursor: pointer;
        }
        .toggle-label input { accent-color: #00a6a0; width: 16px; height: 16px; }

        .clipboard-bar {
            margin-top: 15px;
            padding: 12px 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .clipboard-bar .label { font-weight: 600; color: #00a6a0; font-size: 0.9em; }
        .clipboard-bar .ticked-codes { flex: 1; font-size: 0.85em; color: #555; min-width: 150px; }
        .clipboard-bar .ticked-codes span {
            display: inline-block; background: #00a6a0; color: white;
            padding: 2px 8px; border-radius: 10px; margin: 2px 4px 2px 0; font-size: 0.85em;
        }
        .clipboard-bar .actions { display: flex; gap: 8px; align-items: center; }

        .mode-indicator {
            background: #00a6a0;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: 600;
        }
        .mode-indicator.browse { background: #666; }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand">
                <span class="mark">
                    <span class="dot green"></span>
                    <span class="dot blue"></span>
                    <span class="dot red"></span>
                    <span class="dot black"></span>
                </span>
                <span class="brand-text">Mr Downes Maths</span>
                <span class="tagline">— Designed for learning on your terms</span>
            </div>
            <label class="toggle-label">
                <input type="checkbox" id="officialToggle" onchange="document.body.classList.toggle('show-official', this.checked)">
                Show official wording
            </label>
            <span class="level-badge">Junior Cycle</span>
        </div>
    </header>

    <div class="main">
        <div class="slide" id="slide"></div>
        <div class="nav-bar">
            <div class="nav-left">
                <button class="btn secondary" id="prevBtn" onclick="prevSlide()">◀ Back</button>
            </div>
            <div class="nav-center">
                <span class="mode-indicator browse" id="modeIndicator">Browse</span>
                <span class="page-info" id="pageInfo">1 / 1</span>
            </div>
            <div class="nav-right">
                <button class="btn secondary" id="nextBtn" onclick="nextSlide()">Next ▶</button>
            </div>
        </div>
        <div class="clipboard-bar">
            <span class="label">📋 Selected:</span>
            <div class="ticked-codes" id="tickedCodes">None</div>
            <div class="actions">
                <button class="btn" id="presentBtn" onclick="goToPresentation()">Present Selected</button>
                <button class="btn secondary" onclick="copyTicked()">Copy</button>
            </div>
        </div>
    </div>

            ]},
            { title: 'Strand 4: Statistics & Probability', subtitle: 'Interpreting Data', items: [
                { code: 'SP.17', text: 'Interpret graphical summaries of data', official: 'interpret graphical summaries of data' },
                { code: 'SP.18', text: 'Evaluate how effectively different displays represent data', official: 'evaluate the effectiveness of different displays' },
                { code: 'SP.19', text: 'Recognise how sampling variability affects conclusions', official: 'recognise how sampling variability influences the use of sample information' },
                { code: 'SP.20', text: 'Discuss misconceptions and misuses of statistics', official: 'recognise misconceptions and misuses of statistics' }
            ]}
        ];

        let currentSlide = 0;
        let ticked = {};
        let mode = 'browse'; // 'browse' or 'present'
        let presentationSlides = [];
        let revealIndex = 0;

        function getSelectedItems() {
            const codes = Object.keys(ticked);
            const items = [];
            for (const slide of slides) {
                for (const item of slide.items) {
                    if (codes.includes(item.code)) {
                        items.push(item);
                    }
                }
            }
            return items;
        }

        function buildPresentationSlides() {
            const items = getSelectedItems();
            presentationSlides = [];
            for (let i = 0; i < items.length; i += 4) {
                presentationSlides.push(items.slice(i, i + 4));
            }
            return presentationSlides;
        }

        function renderSlide() {
            const container = document.getElementById('slide');
            const modeIndicator = document.getElementById('modeIndicator');
            
            if (mode === 'browse') {
                modeIndicator.textContent = 'Browse';
                modeIndicator.classList.add('browse');
                modeIndicator.classList.remove('present');
                
                const slide = slides[currentSlide];
                container.innerHTML = `
                    <div class="slide-header">
                        <h2>${slide.title}</h2>
                        <div class="subtitle">${slide.subtitle}</div>
                    </div>
                    ${slide.items.map(item => `
                        <label class="lo-item ${ticked[item.code] ? 'ticked' : ''}">
                            <input type="checkbox" ${ticked[item.code] ? 'checked' : ''} onchange="toggleTick('${item.code}')">
                            <span class="code">${item.code}</span>
                            <div class="content">
                                <span class="text">${item.text}${item.hl ? '<span class="hl-tag">HL</span>' : ''}</span>
                                <div class="official">${item.official}</div>
                            </div>
                        </label>
                    `).join('')}
                `;
                
                document.getElementById('pageInfo').textContent = `${currentSlide + 1} / ${slides.length}`;
                document.getElementById('prevBtn').disabled = currentSlide === 0;
                document.getElementById('nextBtn').disabled = currentSlide === slides.length - 1;
                document.getElementById('presentBtn').textContent = 'Present Selected';
                
            } else {
                // Presentation mode
                modeIndicator.textContent = 'Present';
                modeIndicator.classList.remove('browse');
                
                if (presentationSlides.length === 0) {
                    container.innerHTML = `
                        <div class="slide-header selected-header">
                            <h2>📋 Selected Learning Outcomes</h2>
                            <div class="subtitle">No items selected</div>
                        </div>
                        <p style="text-align:center;color:#999;padding:40px;">Go back to Browse mode and tick some items first.</p>
                    `;
                    document.getElementById('pageInfo').textContent = '0 / 0';
                    return;
                }
                
                const pageItems = presentationSlides[currentSlide];
                const globalStartIndex = currentSlide * 4;
                
                container.innerHTML = `
                    <div class="slide-header selected-header">
                        <h2>📋 Selected Learning Outcomes</h2>
                        <div class="subtitle">Page ${currentSlide + 1} of ${presentationSlides.length} • Use Next to reveal</div>
                    </div>
                    ${pageItems.map((item, i) => {
                        const globalIndex = globalStartIndex + i;
                        let stateClass = 'upcoming';
                        if (globalIndex < revealIndex) stateClass = 'revealed';
                        else if (globalIndex === revealIndex) stateClass = 'current';
                        
                        return `
                            <div class="lo-item presentation ${stateClass}">
                                <span class="code">${item.code}</span>
                                <div class="content">
                                    <span class="text">${item.text}${item.hl ? '<span class="hl-tag">HL</span>' : ''}</span>
                                    <div class="official">${item.official}</div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                `;
                
                const totalItems = getSelectedItems().length;
                document.getElementById('pageInfo').textContent = `${Math.min(revealIndex + 1, totalItems)} / ${totalItems}`;
                document.getElementById('prevBtn').disabled = revealIndex === 0;
                document.getElementById('nextBtn').disabled = revealIndex >= totalItems;
                document.getElementById('presentBtn').textContent = '← Back to Browse';
            }
            
            updateTickedDisplay();
        }

        function toggleTick(code) {
            if (ticked[code]) {
                delete ticked[code];
            } else {
                for (const slide of slides) {
                    const item = slide.items.find(i => i.code === code);
                    if (item) { ticked[code] = item.text; break; }
                }
            }
            renderSlide();
        }

        function updateTickedDisplay() {
            const codes = Object.keys(ticked);
            const container = document.getElementById('tickedCodes');
            container.innerHTML = codes.length === 0 ? 'None' : codes.map(c => `<span>${c}</span>`).join('');
        }

        function prevSlide() {
            if (mode === 'browse') {
                if (currentSlide > 0) { currentSlide--; renderSlide(); }
            } else {
                if (revealIndex > 0) {
                    revealIndex--;
                    currentSlide = Math.floor(revealIndex / 4);
                    renderSlide();
                }
            }
        }

        function nextSlide() {
            if (mode === 'browse') {
                if (currentSlide < slides.length - 1) { currentSlide++; renderSlide(); }
            } else {
                const totalItems = getSelectedItems().length;
                if (revealIndex < totalItems) {
                    revealIndex++;
                    currentSlide = Math.floor(revealIndex / 4);
                    if (currentSlide >= presentationSlides.length) currentSlide = presentationSlides.length - 1;
                    renderSlide();
                }
            }
        }

        function goToPresentation() {
            if (mode === 'browse') {
                mode = 'present';
                buildPresentationSlides();
                currentSlide = 0;
                revealIndex = 0;
            } else {
                mode = 'browse';
                currentSlide = 0;
            }
            renderSlide();
        }

        function copyTicked() {
            const codes = Object.keys(ticked);
            if (codes.length === 0) { alert('Tick some items first!'); return; }
            const text = codes.map(code => `${code}: ${ticked[code]}`).join('\n');
            navigator.clipboard.writeText(text).then(() => alert(`Copied ${codes.length} item(s)!`));
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); nextSlide(); }
            else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prevSlide(); }
        });

        renderSlide();
    </script>
</body>
</html>
